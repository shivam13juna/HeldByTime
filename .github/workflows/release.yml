name: Release

# Build the signed .app on an Apple-Silicon macOS runner and publish it to the
# repo's Releases section. Triggers when you push a version tag (e.g. `v1.0`);
# also runnable by hand from the Actions tab (which builds + uploads an artifact
# but does not create a Release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed for softprops/action-gh-release to create the GitHub Release.
permissions:
  contents: write

jobs:
  build-and-release:
    # macos-14 is Apple Silicon (arm64) — required: build.sh produces arm64-only
    # binaries and asserts it. Xcode (Swift + clang) is preinstalled on the runner.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: helper/go.mod
          cache-dependency-path: helper/go.sum

      - name: Toolchain versions
        run: |
          swift --version
          go version
          clang --version

      - name: Build the signed app bundle (gated on ./run_tests)
        # build.sh runs the full test harness first and refuses to assemble or sign
        # if anything is red, so a failing test fails the release.
        run: |
          chmod +x build.sh run_tests
          ./build.sh

      - name: Package the .app for distribution
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          ZIP="EncryptedVault-${VERSION}.zip"
          # ditto preserves the bundle layout, symlinks, and code signature that a
          # plain `zip` would corrupt.
          ditto -c -k --sequesterRsrc --keepParent "build/dist/EncryptedVault.app" "$ZIP"
          shasum -a 256 "$ZIP" | tee "${ZIP}.sha256"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact (manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: EncryptedVault-app
          path: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.sha256

      - name: Publish to the Releases section
        # Only on tag pushes — a manual run just produces the artifact above.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.package.outputs.zip }}.sha256
          generate_release_notes: true
          body: |
            ## EncryptedVault ${{ github.ref_name }}

            A native macOS app for notes and secrets that can only be opened during
            time windows you choose. See the [README](../blob/main/README.md) for what
            it is and how it works.

            ### Install
            1. Download and unzip `EncryptedVault-${{ github.ref_name }}.zip`.
            2. Move **EncryptedVault.app** to your Applications folder.
            3. The app is **ad-hoc signed**, not notarized, so on first launch macOS
               will warn it's from an unidentified developer — **right-click the app →
               Open**, then confirm. (Or run `xattr -dr com.apple.quarantine
               EncryptedVault.app`.)

            > Requires **macOS 14+ on Apple Silicon** and a network that allows
            > `api.drand.sh`. Verify the download with the included `.sha256` file.
